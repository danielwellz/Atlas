name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  generated-artifacts:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: atlas-mobile/package-lock.json

      - name: Ensure node_modules is not vendored
        run: |
          if [ -d atlas-mobile/node_modules ]; then
            echo "::error::atlas-mobile/node_modules is present in the repository; remove vendored deps and rely on npm ci."
            exit 1
          fi

      - name: Install mobile deps
        run: make mobile-install

      - name: Generate all artifacts
        run: make generate

      - name: Verify generated artifacts are committed
        run: make verify-generated

  api-tests:
    name: API Tests (Go)
    needs: generated-artifacts
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgres://atlas:atlas@localhost:5432/atlas?sslmode=disable
      ATLAS_TEST_POSTGRES_URL: postgres://atlas:atlas@localhost:5432/atlas?sslmode=disable
    defaults:
      run:
        working-directory: atlas-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Download deps
        run: go mod download

      - name: Run database migrations
        working-directory: .
        run: make api-migrate-up

      - name: Run tests (including integration)
        run: |
          set -euo pipefail
          go test -v ./... | tee /tmp/go-test.log
          if grep -q "skipping integration test: postgres unavailable" /tmp/go-test.log; then
            echo "::error::Integration tests were skipped; ensure Postgres is available"
            exit 1
          fi

  mobile-checks:
    name: Mobile Checks (TypeScript)
    needs: generated-artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: atlas-mobile/package-lock.json

      - name: Ensure node_modules is not vendored
        run: |
          if [ -d node_modules ]; then
            echo "::error::atlas-mobile/node_modules is present in the repository; remove vendored deps and rely on npm ci."
            exit 1
          fi

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --watchAll=false

  staging-deploy:
    name: Staging Deploy (GitOps)
    needs:
      - api-tests
      - mobile-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive image metadata
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          tag="${GITHUB_SHA::12}"
          repository="ghcr.io/${owner}/atlas-api"
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"
          echo "reference=${repository}:${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push atlas-api image
        uses: docker/build-push-action@v6
        with:
          context: atlas-api
          file: atlas-api/Dockerfile
          push: true
          tags: |
            ${{ steps.image-meta.outputs.reference }}
            ${{ steps.image-meta.outputs.repository }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update staging manifest image tag
        run: |
          set -euo pipefail
          manifest_file="infra/staging/k8s/kustomization.yaml"
          sed -i -E "s#(newName:[[:space:]]*).+#\\1${{ steps.image-meta.outputs.repository }}#" "${manifest_file}"
          sed -i -E "s#(newTag:[[:space:]]*).+#\\1${{ steps.image-meta.outputs.tag }}#" "${manifest_file}"

      - name: Commit updated staging manifest
        env:
          IMAGE_TAG: ${{ steps.image-meta.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- infra/staging/k8s/kustomization.yaml; then
            echo "No manifest change detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/staging/k8s/kustomization.yaml
          git commit -m "chore(staging): deploy atlas-api ${IMAGE_TAG} [skip ci]"
          git push

      - name: Install Argo CD CLI
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/download/v2.12.6/argocd-linux-amd64
          chmod +x /tmp/argocd
          sudo mv /tmp/argocd /usr/local/bin/argocd

      - name: Sync Argo CD staging app
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ]; then
            echo "::error::ARGOCD_SERVER and ARGOCD_AUTH_TOKEN secrets are required"
            exit 1
          fi
          argocd app sync atlas-api-staging \
            --server "${ARGOCD_SERVER}" \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --grpc-web \
            --insecure \
            --timeout 600
          argocd app wait atlas-api-staging \
            --server "${ARGOCD_SERVER}" \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --grpc-web \
            --insecure \
            --health \
            --timeout 600

      - name: Run staging smoke tests
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_API_BASE_URL}" ]; then
            echo "::error::STAGING_API_BASE_URL secret is required"
            exit 1
          fi
          infra/staging/smoke/smoke-staging.sh "${STAGING_API_BASE_URL}"

      - name: Validate OTel traces are emitted
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          STAGING_OTEL_COLLECTOR_METRICS_URL: ${{ secrets.STAGING_OTEL_COLLECTOR_METRICS_URL }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_API_BASE_URL}" ] || [ -z "${STAGING_OTEL_COLLECTOR_METRICS_URL}" ]; then
            echo "::error::STAGING_API_BASE_URL and STAGING_OTEL_COLLECTOR_METRICS_URL secrets are required"
            exit 1
          fi

          for _ in $(seq 1 5); do
            curl --fail --show-error --silent "${STAGING_API_BASE_URL%/}/api/v1/health" >/dev/null
            sleep 2
          done

          collector_metrics="$(mktemp)"
          curl --fail --show-error --silent "${STAGING_OTEL_COLLECTOR_METRICS_URL}" > "${collector_metrics}"
          if ! grep -E 'otelcol_receiver_accepted_spans\\{[^}]*\\}[[:space:]]+[1-9][0-9]*' "${collector_metrics}" >/dev/null; then
            echo "::error::No accepted spans observed in collector metrics"
            cat "${collector_metrics}"
            exit 1
          fi
