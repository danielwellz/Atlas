            $ref: '#/components/schemas/NutritionMealPlanEditableItem'

    NutritionMealPlanResponse:
      type: object
      required:
        - meal_plan
      properties:
        meal_plan:
          $ref: '#/components/schemas/NutritionMealPlan'

    NutritionRecipeImportDraft:
      type: object
      required:
        - slug
        - name
        - meal_type
        - description
        - servings
        - calories_kcal
        - protein_g
        - carbs_g
        - fat_g
        - ingredients
        - instructions
      properties:
        slug:
          type: string
        name:
          type: string
        meal_type:
          type: string
        description:
          type: string
        servings:
          type: number
          format: float
          minimum: 0
          exclusiveMinimum: true
        calories_kcal:
          type: integer
          format: int32
          minimum: 0
        protein_g:
          type: integer
          format: int32
          minimum: 0
        carbs_g:
          type: integer
          format: int32
          minimum: 0
        fat_g:
          type: integer
          format: int32
          minimum: 0
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/NutritionRecipeIngredient'
        instructions:
          type: array
          items:
            type: string

    NutritionRecipeImportRequest:
      type: object
      required:
        - source_url
      properties:
        source_url:
          type: string
          format: uri
        confirm:
          type: boolean
        draft:
          $ref: '#/components/schemas/NutritionRecipeImportDraft'

    NutritionRecipeImportResponse:
      type: object
      required:
        - source_url
        - confirmed
        - draft
      properties:
        source_url:
          type: string
          format: uri
        confirmed:
          type: boolean
        draft:
          $ref: '#/components/schemas/NutritionRecipeImportDraft'
        recipe:
          allOf:
            - $ref: '#/components/schemas/NutritionRecipe'
          nullable: true

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
