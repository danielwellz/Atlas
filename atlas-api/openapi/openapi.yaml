openapi: 3.0.3
info:
  title: Atlas API
  version: 1.0.0
  description: Atlas mobile fitness platform local API contract.
servers:
  - url: http://localhost:8080

tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Billing
  - name: Consent
  - name: FormCheck
  - name: Exercise
  - name: Onboarding
  - name: Program
  - name: Workout
  - name: Dashboard
  - name: Analytics
  - name: Habit
  - name: Nutrition
  - name: Food
  - name: Community
  - name: CoachSession

paths:
  /api/v1/health:
    get:
      operationId: GetHealth
      tags:
        - Health
      summary: Health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/register:
    post:
      operationId: PostAuthRegister
      tags:
        - Auth
      summary: Register a user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      operationId: PostAuthLogin
      tags:
        - Auth
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      operationId: PostAuthLogout
      tags:
        - Auth
      summary: Logout a user session by refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout successful
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      operationId: PostAuthRefresh
      tags:
        - Auth
      summary: Refresh auth tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me:
    get:
      operationId: GetMe
      tags:
        - User
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/billing/verify:
    post:
      operationId: PostBillingVerify
      tags:
        - Billing
      summary: Validate an app-store receipt/token and update subscription entitlements
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingVerifyRequest'
      responses:
        '200':
          description: Subscription verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingVerifyResponse'
        '400':
          description: Invalid billing payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/consents:
    get:
      operationId: GetConsents
      tags:
        - Consent
      summary: List consents for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Consents list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/consents/grant:
    post:
      operationId: PostConsentsGrant
      tags:
        - Consent
      summary: Grant consent for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantConsentRequest'
      responses:
        '200':
          description: Consent granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Entitlement required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/consents/revoke:
    post:
      operationId: PostConsentsRevoke
      tags:
        - Consent
      summary: Revoke consent for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeConsentRequest'
      responses:
        '200':
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Active consent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/form-check/uploads:
    post:
      operationId: PostFormCheckUploads
      tags:
        - FormCheck
      summary: Upload form-check result metadata for coach review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormCheckUploadRequest'
      responses:
        '201':
          description: Form-check upload metadata accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormCheckUploadResponse'
        '400':
          description: Invalid upload payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Entitlement or consent required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/events:
    post:
      operationId: PostEvents
      tags:
        - Analytics
      summary: Ingest product analytics event
      description: |
        Accepts privacy-safe product analytics events. Authentication is optional:
        authenticated users require active `product_analytics` consent, and
        anonymous clients must explicitly set `consentGranted=true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostEventRequest'
      responses:
        '202':
          description: Event accepted for ingestion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventIngestResponse'
        '400':
          description: Invalid event payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Analytics consent is not granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/dashboard/summary:
    get:
      operationId: GetDashboardSummary
      tags:
        - Dashboard
      summary: Get dashboard summary metrics for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Deep nutrition subscription required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/dashboard/readiness-checkin:
    post:
      operationId: PostDashboardReadinessCheckin
      tags:
        - Dashboard
      summary: Upsert readiness check-in for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardReadinessCheckinRequest'
      responses:
        '200':
          description: Readiness check-in saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardReadinessCheckinResponse'
        '400':
          description: Invalid check-in payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/habits:
    get:
      operationId: GetHabits
      tags:
        - Habit
      summary: List habits for current user
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          description: UTC date key (`YYYY-MM-DD`) used to resolve completion state. Defaults to current UTC date.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Habit list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: PostHabits
      tags:
        - Habit
      summary: Create habit for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHabitRequest'
      responses:
        '201':
          description: Habit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Max active habits reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/habits/{id}/toggle_today:
    post:
      operationId: PostHabitsIdToggleToday
      tags:
        - Habit
      summary: Toggle today's completion status for a habit
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Habit daily log toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitToggleTodayResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/habits/streaks:
    get:
      operationId: GetHabitsStreaks
      tags:
        - Habit
      summary: Get current and longest streaks per habit
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Habit streak list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitStreaksResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/momentum-sprint/enroll:
    post:
      operationId: PostMomentumSprintEnroll
      tags:
        - Habit
      summary: Enroll current user in the 14-day Momentum Sprint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MomentumSprintEnrollRequest'
      responses:
        '200':
          description: Momentum Sprint enrollment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentumSprintStatusResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/momentum-sprint/status:
    get:
      operationId: GetMomentumSprintStatus
      tags:
        - Habit
      summary: Get current user's Momentum Sprint progress and today's checklist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Momentum Sprint status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentumSprintStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/momentum-sprint/day-complete:
    post:
      operationId: PostMomentumSprintDayComplete
      tags:
        - Habit
      summary: Update today's Momentum Sprint checklist entry completion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MomentumSprintDayCompleteRequest'
      responses:
        '200':
          description: Momentum Sprint checklist updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentumSprintStatusResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sprint enrollment or checklist entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/targets:
    put:
      operationId: PutNutritionTargets
      tags:
        - Nutrition
      summary: Create or update nutrition targets for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertNutritionTargetsRequest'
      responses:
        '200':
          description: Nutrition targets upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionTargetsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/today:
    get:
      operationId: GetNutritionToday
      tags:
        - Nutrition
      summary: Get today's nutrition status for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Today's nutrition status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionTodayResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/checkin:
    post:
      operationId: PostNutritionCheckin
      tags:
        - Nutrition
      summary: Create or update a daily nutrition check-in for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NutritionCheckinRequest'
      responses:
        '200':
          description: Nutrition check-in upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionCheckinResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/weight:
    post:
      operationId: PostNutritionWeightEntry
      tags:
        - Nutrition
      summary: Create or update a weight entry for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertWeightEntryRequest'
      responses:
        '200':
          description: Weight entry upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionWeightEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: PutNutritionWeightEntry
      tags:
        - Nutrition
      summary: Create or update a weight entry for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertWeightEntryRequest'
      responses:
        '200':
          description: Weight entry upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionWeightEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/weight/trend:
    get:
      operationId: GetNutritionWeightTrend
      tags:
        - Nutrition
      summary: Get weekly weight trend for the last 8 weeks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Weekly weight trend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionWeightTrendResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/weekly-checkin:
    post:
      operationId: PostNutritionWeeklyCheckin
      tags:
        - Nutrition
      summary: Run weekly nutrition adjustment for current user
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NutritionWeeklyCheckinRequest'
      responses:
        '200':
          description: Weekly nutrition check-in generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionWeeklyCheckinResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Deep nutrition subscription required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/weekly-checkin/latest:
    get:
      operationId: GetNutritionWeeklyCheckinLatest
      tags:
        - Nutrition
      summary: Get latest weekly nutrition check-in for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Latest weekly nutrition check-in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionWeeklyCheckinResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Deep nutrition subscription required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No weekly check-in found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/nutrition/meal-plan/generate:
    post:
      operationId: PostNutritionMealPlanGenerate
      tags:
        - Nutrition
      summary: Generate meal plan and grocery list for current user
      security:
        - bearerAuth: []
      requestBody:
        required: false
