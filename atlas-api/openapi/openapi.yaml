components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    EntitlementKey:
      type: string
      enum:
        - barcode_scan
        - deep_nutrition
        - biomechanics_overlays
        - form_check_upload
        - coach_tier_pro
        - coach_tier_elite

    CoachTier:
      type: string
      enum:
        - free
        - pro
        - elite

    User:
      type: object
      required:
        - id
        - email
        - isPro
        - entitlements
        - coachTier
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        email:
          type: string
          format: email
          example: user@atlas.local
        isPro:
          type: boolean
          description: Whether the user has an active Pro entitlement.
        entitlements:
          type: array
          description: Active entitlement keys for the user.
          items:
            $ref: '#/components/schemas/EntitlementKey'
        coachTier:
          $ref: '#/components/schemas/CoachTier'
        createdAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required:
        - status
        - service
        - env
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: atlas-api
        env:
          type: string
          example: local
        timestamp:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    TokenResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int32
          example: 900

    AuthResponse:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/TokenResponse'

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'

    BillingPlatform:
      type: string
      enum:
        - ios
        - android

    SubscriptionStatus:
      type: string
      enum:
        - active
        - expired
        - canceled
        - grace_period
        - refunded

    Subscription:
      type: object
      required:
        - id
        - userId
        - platform
        - productId
        - status
        - rawReceipt
        - transactionId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        platform:
          $ref: '#/components/schemas/BillingPlatform'
        productId:
          type: string
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        expiresAt:
          type: string
          format: date-time
          nullable: true
        transactionId:
          type: string
        originalTransactionId:
          type: string
          nullable: true
        rawReceipt:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BillingVerifyRequest:
      type: object
      required:
        - platform
        - productId
        - receiptToken
      properties:
        platform:
          $ref: '#/components/schemas/BillingPlatform'
        productId:
          type: string
        receiptToken:
          type: string
          description: Store receipt (iOS) or purchase token (Android).
        transactionId:
          type: string
          nullable: true
        originalTransactionId:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        restore:
          type: boolean
          default: false

    BillingVerifyResponse:
      type: object
      required:
        - subscription
        - entitlements
        - coachTier
        - isPro
        - restored
      properties:
        subscription:
          $ref: '#/components/schemas/Subscription'
        entitlements:
          type: array
          items:
            $ref: '#/components/schemas/EntitlementKey'
        coachTier:
          $ref: '#/components/schemas/CoachTier'
        isPro:
          type: boolean
        restored:
          type: boolean

    ConsentType:
      type: string
      enum:
        - camera_form_check
        - progress_photos
        - share_to_coach
        - movement_screen_camera
        - form_check_local
        - form_check_upload
        - product_analytics

    Consent:
      type: object
      required:
        - id
        - consentType
        - grantedAt
        - metadataJson
      properties:
        id:
          type: string
          format: uuid
        consentType:
          $ref: '#/components/schemas/ConsentType'
        grantedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
        metadataJson:
          type: object
          additionalProperties: true

    ConsentsResponse:
      type: object
      required:
        - consents
      properties:
        consents:
          type: array
          items:
            $ref: '#/components/schemas/Consent'

    ConsentResponse:
      type: object
      required:
        - consent
      properties:
        consent:
          $ref: '#/components/schemas/Consent'

    GrantConsentRequest:
      type: object
      required:
        - consentType
      properties:
        consentType:
          $ref: '#/components/schemas/ConsentType'
        metadataJson:
          type: object
          additionalProperties: true

    RevokeConsentRequest:
      type: object
      required:
        - consentType
      properties:
        consentType:
          $ref: '#/components/schemas/ConsentType'

    FormCheckMovementType:
      type: string
      enum:
        - squat
        - hinge
        - lunge
        - push
        - pull

    FormCheckResultSummary:
      type: object
      required:
        - overallScore
        - rangeOfMotionScore
        - kneeTrackingScore
        - symmetryScore
        - rangeOfMotionDegrees
        - repetitionCount
        - feedback
      properties:
        overallScore:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        rangeOfMotionScore:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        kneeTrackingScore:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        symmetryScore:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        rangeOfMotionDegrees:
          type: number
          format: float
          minimum: 0
        repetitionCount:
          type: integer
          format: int32
          minimum: 0
        feedback:
          type: array
          items:
            type: string

    FormCheckUploadRequest:
      type: object
      required:
        - movementType
        - recordingStartedAt
        - recordingEndedAt
        - summary
      properties:
        movementType:
          $ref: '#/components/schemas/FormCheckMovementType'
        recordingStartedAt:
          type: string
          format: date-time
        recordingEndedAt:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/FormCheckResultSummary'
        storageKey:
          type: string
          description: Optional storage key/URI for persisted media or artifact package.
        metadataJson:
          type: object
          additionalProperties: true

    FormCheckUpload:
      type: object
      required:
        - id
        - userId
        - movementType
        - recordingStartedAt
        - recordingEndedAt
        - summary
        - storageKey
        - metadataJson
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        movementType:
          $ref: '#/components/schemas/FormCheckMovementType'
        recordingStartedAt:
          type: string
          format: date-time
        recordingEndedAt:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/FormCheckResultSummary'
        storageKey:
          type: string
        metadataJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    FormCheckUploadResponse:
      type: object
      required:
        - upload
      properties:
        upload:
          $ref: '#/components/schemas/FormCheckUpload'

    AppEventName:
      type: string
      enum:
        - onboarding_started
        - onboarding_goal_selected
        - onboarding_equipment_selected
        - onboarding_schedule_selected
        - onboarding_completed
        - workout_completed

    PostEventRequest:
      type: object
      required:
        - eventName
        - eventTime
        - consentGranted
      properties:
        eventName:
          $ref: '#/components/schemas/AppEventName'
        eventTime:
          type: string
          format: date-time
        consentGranted:
          type: boolean
          description: |
            Client-side analytics opt-in state at event capture time.
        properties:
          type: object
          additionalProperties: true

    EventIngestResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean
        eventId:
          type: string
          format: uuid
          nullable: true

    ExerciseMedia:
      type: object
      required:
        - id
        - exerciseId
        - mediaType
        - uri
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        exerciseId:
          type: string
          format: uuid
        mediaType:
          type: string
          enum:
            - image
            - video
        uri:
          type: string
          description: Local file path for MVP.
        thumbnailUri:
          type: string
          nullable: true
        durationSeconds:
          type: integer
          format: int32
          nullable: true
        createdAt:
          type: string
          format: date-time

    Exercise:
      type: object
      required:
        - id
        - slug
        - name
        - primaryMuscleGroup
        - primaryMuscles
        - secondaryMuscles
        - movementPattern
        - contraindications
        - equipment
        - difficulty
        - description
        - createdAt
        - media
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        primaryMuscleGroup:
          type: string
        primaryMuscles:
          type: array
          items:
            type: string
        secondaryMuscles:
          type: array
          items:
            type: string
        movementPattern:
          type: string
        contraindications:
          type: array
          items:
            type: string
        equipment:
          type: array
          items:
            type: string
        difficulty:
          type: string
          enum:
            - beginner
            - intermediate
            - advanced
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        media:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseMedia'

    ExerciseSubstituteWhy:
      type: object
      required:
        - matchedPattern
        - matchedMuscles
        - equipmentFit
      properties:
        matchedPattern:
          type: array
          items:
            type: string
        matchedMuscles:
          type: array
          items:
            type: string
        equipmentFit:
          type: string
          enum:
            - exact
            - partial
            - not_applicable

    ExerciseSubstitute:
      type: object
      required:
        - exercise
        - why
      properties:
        exercise:
          $ref: '#/components/schemas/Exercise'
        why:
          $ref: '#/components/schemas/ExerciseSubstituteWhy'

    ExerciseSubstitutesResponse:
      type: object
      required:
        - substitutes
      properties:
        substitutes:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseSubstitute'

    ExercisesResponse:
      type: object
      required:
        - exercises
      properties:
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'

    ExerciseResponse:
      type: object
      required:
        - exercise
      properties:
        exercise:
          $ref: '#/components/schemas/Exercise'

    ExerciseBiomechanics:
      type: object
      required:
        - exerciseId
        - exerciseSlug
        - exerciseName
        - animationAssetKey
        - animationAssetUri
        - rigVersion
        - muscleHighlights
        - jointAngles
        - metadata
      properties:
        exerciseId:
          type: string
          format: uuid
        exerciseSlug:
          type: string
        exerciseName:
          type: string
        animationAssetKey:
          type: string
        animationAssetUri:
          type: string
        rigVersion:
          type: string
        muscleHighlights:
          type: array
          items:
            $ref: '#/components/schemas/MuscleHighlight'
        jointAngles:
          type: array
          items:
            $ref: '#/components/schemas/JointAngle'
        metadata:
          type: object
          additionalProperties: true

    MuscleHighlight:
      type: object
      required:
        - muscleGroup
        - activationLevel
        - role
      properties:
        muscleGroup:
          type: string
        activationLevel:
          type: number
          format: float
        role:
          type: string
        colorHex:
          type: string

    JointAngle:
      type: object
      required:
        - joint
        - minDegrees
        - maxDegrees
        - targetDegrees
        - unit
      properties:
        joint:
          type: string
        minDegrees:
          type: number
          format: float
        maxDegrees:
          type: number
          format: float
        targetDegrees:
          type: number
          format: float
        unit:
          type: string

    ExerciseBiomechanicsResponse:
      type: object
      required:
        - biomechanics
      properties:
        biomechanics:
          $ref: '#/components/schemas/ExerciseBiomechanics'

    UserProfile:
      type: object
      required:
        - userId
        - displayName
        - sex
        - heightCm
        - weightKg
        - experienceLevel
        - createdAt
        - updatedAt
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        sex:
          type: string
        heightCm:
          type: integer
          format: int32
        weightKg:
          type: number
          format: float
        experienceLevel:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserGoals:
      type: object
      required:
        - userId
        - primaryGoal
        - daysPerWeek
        - sessionDurationMinutes
        - equipmentAccessJson
        - constraintsJson
        - injuriesLimitationsJson
        - modalityPreferencesJson
