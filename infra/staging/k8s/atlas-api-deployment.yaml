apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-api
    spec:
      containers:
        - name: atlas-api
          image: atlas-api-image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: staging
            - name: APP_NAME
              value: atlas-api
            - name: API_SERVER_ADDR
              value: :8080
            - name: LOG_LEVEL
              value: info
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
          envFrom:
            - secretRef:
                name: atlas-api-staging-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
