apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-staging

resources:
  - namespace.yaml
  - atlas-api-deployment.yaml
  - atlas-api-service.yaml
  - atlas-api-ingress.yaml
  - ../otel-collector

images:
  - name: atlas-api-image
    newName: ghcr.io/your-org/atlas-api
    newTag: staging-latest

labels:
  - pairs:
      app.kubernetes.io/part-of: atlas
      app.kubernetes.io/managed-by: gitops
      app.kubernetes.io/environment: staging
