apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: api.staging.atlas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-api
                port:
                  number: 80
