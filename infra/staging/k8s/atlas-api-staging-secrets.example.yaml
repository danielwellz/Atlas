apiVersion: v1
kind: Secret
metadata:
  name: atlas-api-staging-secrets
  namespace: atlas-staging
type: Opaque
stringData:
  POSTGRES_URL: postgres://atlas:<password>@<managed-postgres-host>:5432/atlas?sslmode=require
  REDIS_ADDR: <managed-redis-host>:6379
  ASSET_STORAGE_BACKEND: s3
  ASSET_STORAGE_BUCKET: <s3-bucket-name>
  MINIO_ENDPOINT: <s3-endpoint>
  MINIO_ROOT_USER: <s3-access-key-id>
  MINIO_ROOT_PASSWORD: <s3-secret-access-key>
  MINIO_USE_SSL: "true"
  JWT_SECRET: <strong-random-secret>
  ACCESS_TOKEN_TTL_MINUTES: "15"
  REFRESH_TOKEN_TTL_HOURS: "720"
  USDA_API_BASE_URL: https://api.nal.usda.gov/fdc/v1
  USDA_API_KEY: <usda-api-key>
  EDAMAM_API_BASE_URL: https://api.edamam.com
  EDAMAM_APP_ID: <edamam-app-id>
  EDAMAM_APP_KEY: <edamam-app-key>
  FOOD_DETAILS_CACHE_TTL_MINUTES: "60"
  PRO_ALL_USERS: "false"
  PRO_USER_EMAILS: ""
