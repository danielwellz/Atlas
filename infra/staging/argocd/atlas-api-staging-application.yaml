apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlas-api-staging
  namespace: argocd
spec:
  project: default
  source:
    # Replace with the canonical Atlas repository URL.
    repoURL: https://github.com/your-org/atlas.git
    targetRevision: main
    path: infra/staging/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: atlas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 5
