services:
  atlas-api:
    image: ghcr.io/your-org/atlas-api:${ATLAS_API_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: staging
      APP_NAME: atlas-api
      API_SERVER_ADDR: :8080
      LOG_LEVEL: info
      POSTGRES_URL: ${POSTGRES_URL:?set POSTGRES_URL}
      REDIS_ADDR: ${REDIS_ADDR:?set REDIS_ADDR}
      ASSET_STORAGE_BACKEND: ${ASSET_STORAGE_BACKEND:-s3}
      ASSET_STORAGE_BUCKET: ${ASSET_STORAGE_BUCKET:?set ASSET_STORAGE_BUCKET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?set MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_HOURS: ${REFRESH_TOKEN_TTL_HOURS:-720}
      USDA_API_BASE_URL: ${USDA_API_BASE_URL:-https://api.nal.usda.gov/fdc/v1}
      USDA_API_KEY: ${USDA_API_KEY:?set USDA_API_KEY}
      EDAMAM_API_BASE_URL: ${EDAMAM_API_BASE_URL:-https://api.edamam.com}
      EDAMAM_APP_ID: ${EDAMAM_APP_ID:?set EDAMAM_APP_ID}
      EDAMAM_APP_KEY: ${EDAMAM_APP_KEY:?set EDAMAM_APP_KEY}
      FOOD_DETAILS_CACHE_TTL_MINUTES: ${FOOD_DETAILS_CACHE_TTL_MINUTES:-60}
      PRO_ALL_USERS: ${PRO_ALL_USERS:-false}
      PRO_USER_EMAILS: ${PRO_USER_EMAILS:-}
